name: Refresh stock and map data

on:
  schedule:
    - cron: '20 21 * * 1-5'   # after US market close weekdays
    - cron: '0 4 * * 1'       # weekly full rebalance
  workflow_dispatch:

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install deps
        run: pip install -r requirements.txt

      - name: Refresh datasets
        run: python scripts/update_data.py

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/stocks.json data/index-maps.json data/update-meta.json
          git diff --cached --quiet || (git commit -m "chore: refresh market maps and stock classifications" && git push)
