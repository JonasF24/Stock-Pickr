<!DOCTYPE html>
<html lang="en" data-theme="dark">
  <head>
    <meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Stock Pickr • Crypto</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" /><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="bg-glow bg-glow-1"></div><div class="bg-glow bg-glow-2"></div>
    <header class="hero wrapper">
      <nav class="top-nav glass">
        <h1>Stock Pickr</h1>
        <div class="nav-links">
          <a href="index.html">Stock Picks</a>
          <a href="maps.html">Index Maps</a>
          <a href="news.html">News</a>
          <a class="active" href="crypto.html">Crypto</a>
          <a href="prediction-markets.html">Prediction Markets</a>
        </div>
        <div class="account-menu" id="accountMenuRoot">
          <button id="accountMenuButton" class="account-trigger" aria-label="Open account and settings menu" aria-expanded="false">
            <span id="accountAvatar" class="profile-avatar" aria-hidden="true">👤</span>
            <span id="accountLabel" class="account-label">Account</span>
          </button>
          <div id="accountMenuPanel" class="account-panel glass" hidden>
            <p id="accountStatus" class="mini-line">No account connected.</p>
            <button id="menuThemeToggle" class="menu-action" type="button">Toggle light/dark mode</button>
            <form id="signupForm" class="signup-form">
              <label for="authMethod">Sign up method</label>
              <select id="authMethod" name="authMethod">
                <option value="google">Google</option>
                <option value="email_phone">Email + phone</option>
              </select>

              <label for="fullName">Full name</label>
              <input id="fullName" name="fullName" type="text" placeholder="Jane Investor" required />

              <label for="email">Email</label>
              <input id="email" name="email" type="email" placeholder="jane@email.com" required />

              <label for="phone">Phone number</label>
              <input id="phone" name="phone" type="tel" placeholder="+1 555 123 4567" />

              <label for="password">Password</label>
              <input id="password" name="password" type="password" placeholder="Create password" />

              <button class="menu-action menu-action-primary" type="submit">Create account</button>
            </form>
            <p id="signupMessage" class="mini-line"></p>
            <button id="signOutButton" class="menu-action" type="button">Sign out</button>
          </div>
        </div>
      </nav>
      <div class="hero-content glass"><p class="eyebrow">Crypto Dashboard</p><h2>Large-cap digital asset watchlist</h2></div>
    </header>
    <main class="wrapper"><section id="cryptoBoard" class="stats-grid"></section></main>
    <footer class="wrapper footer"><p>Crypto monitor for trend and momentum snapshots.</p></footer>
    <script src="app.js" type="module"></script>
  </body>
</html>
