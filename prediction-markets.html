<!DOCTYPE html>
<html lang="en" data-theme="dark">
  <head>
    <meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Stock Pickr • Prediction Markets</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" /><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="styles.css" />
    <script src="https://accounts.google.com/gsi/client" async defer></script>
  </head>
  <body>
    <div class="bg-glow bg-glow-1"></div><div class="bg-glow bg-glow-2"></div>
    <header class="hero wrapper">
      <nav class="top-nav glass">
        <h1>Stock Pickr</h1>
        <div class="nav-links">
          <a href="index.html">Stock Picks</a>
          <a href="maps.html">Index Maps</a>
          <a href="news.html">News</a>
          <a href="crypto.html">Crypto</a>
          <a class="active" href="prediction-markets.html">Prediction Markets</a>
        </div>
        <div class="account-menu" id="accountMenuRoot">
          <button id="accountMenuButton" class="account-trigger" aria-label="Open account and settings menu" aria-expanded="false">
            <span id="accountAvatar" class="profile-avatar" aria-hidden="true">👤</span>
            <span id="accountLabel" class="account-label">Account</span>
          </button>
          <div id="accountMenuPanel" class="account-panel glass" hidden>
            <p id="accountStatus" class="mini-line">No account connected.</p>
            <button id="menuThemeToggle" class="menu-action" type="button">Toggle light/dark mode</button>

            <p class="menu-section-title">Continue with Google</p>
            <div id="googleSigninButton" class="google-signin-slot"></div>
            <p id="googleConfigHint" class="mini-line"></p>

            <p class="menu-section-title">Or sign up with email + phone</p>
            <form id="emailSignupForm" class="signup-form">
              <label for="fullName">Full name</label>
              <input id="fullName" name="fullName" type="text" placeholder="Jane Investor" required />

              <label for="email">Email</label>
              <input id="email" name="email" type="email" placeholder="jane@email.com" required />

              <label for="phone">Phone number</label>
              <input id="phone" name="phone" type="tel" placeholder="+1 555 123 4567" required />

              <label for="password">Password</label>
              <input id="password" name="password" type="password" placeholder="Create password" required />

              <button class="menu-action menu-action-primary" type="submit">Create account</button>
            </form>
            <p id="signupMessage" class="mini-line"></p>
            <button id="signOutButton" class="menu-action" type="button">Sign out</button>
          </div>
        </div>
      </nav>
      <div class="hero-content glass"><p class="eyebrow">Forward Signals</p><h2>Prediction market probabilities</h2></div>
    </header>
    <main class="wrapper"><section id="predictionBoard" class="strategy-sections"></section></main>
    <footer class="wrapper footer"><p>Prediction market page for scenario pricing.</p></footer>
    <script src="app.js" type="module"></script>
  </body>
</html>
